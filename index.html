<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Expense Tracker</h1>
            <button id="add-sub-btn">+ Add Subscription</button>
        </header>

        <section class="summary-section">
            <div class="card">
                <h3>Monthly Spend</h3>
                <h2 id="monthly-total">$0.00</h2>
            </div>
            <div class="card">
                <h3>Yearly Spend</h3>
                <h2 id="yearly-total">$0.00</h2>
            </div>
        </section>

        <section class="table-section">
            <h2>Active Subscriptions</h2>
            <table id="subscription-table">
                <thead>
                    <tr>
                        <th>Service Name</th>
                        <th>Category</th>
                        <th>Cycle</th>
                        <th>Next Payment</th>
                        <th>Amount</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td>Example: Netflix</td>
                        <td>Entertainment</td>
                        <td>Monthly</td>
                        <td>2026-06-25</td>
                        <td>$15.49</td>
                        <td><button class="delete-btn">Remove</button></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
